<!DOCTYPE html>
<html lang="en-us">
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
    <title>{{{ PRODUCT_NAME }}}</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body { width: 100%; height: 100%; background: #000; overflow: hidden; }
      #unity-container { width: 100%; height: 100%; position: relative; }
      #unity-canvas { width: 100%; height: 100%; display: block; }
      #unity-loading-bar {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        display: none;
        text-align: center;
        color: #fff;
        font-family: sans-serif;
      }
      #unity-progress-bar-empty {
        width: 220px;
        height: 6px;
        background: #333;
        border-radius: 3px;
        margin-top: 12px;
        overflow: hidden;
      }
      #unity-progress-bar-full {
        width: 0;
        height: 100%;
        background: #fff;
        border-radius: 3px;
        transition: width 0.2s;
      }
    </style>
  </head>
  <body>
    <div id="unity-container">
      <canvas id="unity-canvas" tabindex="-1"></canvas>
      <div id="unity-loading-bar">
        <div id="unity-loading-label">{{{ PRODUCT_NAME }}}</div>
        <div id="unity-progress-bar-empty">
          <div id="unity-progress-bar-full"></div>
        </div>
      </div>
    </div>

    <script>
      var canvas        = document.querySelector("#unity-canvas");
      var loadingBar    = document.querySelector("#unity-loading-bar");
      var progressFull  = document.querySelector("#unity-progress-bar-full");

      var buildUrl  = "Build";
      var loaderUrl = buildUrl + "/{{{ LOADER_FILENAME }}}";

      var config = {
        dataUrl:             buildUrl + "/{{{ DATA_FILENAME }}}",
        frameworkUrl:        buildUrl + "/{{{ FRAMEWORK_FILENAME }}}",
        codeUrl:             buildUrl + "/{{{ CODE_FILENAME }}}",
        streamingAssetsUrl:  "StreamingAssets",
        companyName:         "{{{ COMPANY_NAME }}}",
        productName:         "{{{ PRODUCT_NAME }}}",
        productVersion:      "{{{ PRODUCT_VERSION }}}",
      };

      loadingBar.style.display = "block";

      var script    = document.createElement("script");
      script.src    = loaderUrl;
      script.onload = function () {
        createUnityInstance(canvas, config, function (progress) {
          progressFull.style.width = (100 * progress) + "%";
        }).then(function (instance) {
          window.unityInstance    = instance;
          loadingBar.style.display = "none";
        }).catch(function (msg) {
          console.error("Unity failed to load:", msg);
        });
      };
      document.body.appendChild(script);
    </script>
  </body>
</html>
